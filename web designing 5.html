<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Banner</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    .hero {
      background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
      background-size: cover;
      background-position: center;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 2em;
    }
    .hero h1 {
      font-size: 3em;
      margin-bottom: 0.5em;
    }
    .hero p {
      font-size: 1.2em;
      max-width: 600px;
      margin-bottom: 1.5em;
    }
    .hero button {
      background-color: #00bfff;
      color: #fff;
      border: none;
      padding: 0.8em 1.5em;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .hero button:hover {
      background-color: #0099cc;
    }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2em; }
      .hero p { font-size: 1em; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Empower Your Digital Presence</h1>
    <p>Build modern, responsive websites that captivate your audience and drive results.</p>
    <button>Get Started</button>
  </section>
</body>
</html>
